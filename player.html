<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AETHER Player | Music Player</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/player.css">

</head>

<body>

<div class="background-blur"></div>

<div class="app">

<!-- ================= Sidebar ================= -->

<aside class="sidebar">

<div class="logo">

<h2>🎵 AETHER</h2>

<p>Offline First</p>

</div>

<nav>

<a class="active" href="#">🏠 Home</a>

<a href="#">🎵 Library</a>

<a href="#">❤️ Favorites</a>

<a href="#">📁 Upload</a>

<a href="#">☁ Cloud Sync</a>

<a href="#">⚙ Settings</a>

</nav>

<div class="sidebar-footer">

<p>Version 2.0 Developer Preview</p>

</div>

</aside>

<!-- ================= Main ================= -->

<main class="main">

<header>

<div class="search">

<input
id="searchInput"
type="text"
placeholder="Search your music...">

</div>

<div class="top-buttons">

<input
type="file"
id="musicUpload"
accept="audio/*"
multiple
hidden>

<button id="uploadBtn">
📁 Upload Music
</button>

<button>
ESP32
</button>

<button>
GitHub
</button>

</div>

</header>

<section class="hero-player">

<div class="album-card">

<div class="album-art"></div>

<h2 id="nowPlayingTitle">
No Song Playing
</h2>

<p id="nowPlayingArtist">
Upload music to begin
</p>

<div id="progress" class="progress">

<div id="progressFill" class="progress-fill"></div>

</div>

<div class="time-info">

<span id="currentTime">0:00</span>

<span id="duration">0:00</span>

</div>

<div class="controls">

<button id="prevBtn">⏮</button>

<button id="playPauseBtn">▶</button>

<button id="nextBtn">⏭</button>

</div>

<div class="volume-container">

🔊

<input
id="volumeSlider"
type="range"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>

<div class="playlist">

<h2>Library</h2>

<div id="songList">

<p>No songs uploaded.</p>

</div>

</div>

</section>
<section class="stats">

    <div class="stat-card">

        <h2 id="songCount">0</h2>

        <p>Offline Songs</p>

    </div>

    <div class="stat-card">

        <h2>ESP32</h2>

        <p>Ready</p>

    </div>

    <div class="stat-card">

        <h2>Spotify</h2>

        <p>Companion (Coming)</p>

    </div>

    <div class="stat-card">

        <h2>YouTube</h2>

        <p>Companion (Coming)</p>

    </div>

</section>

<!-- HTML5 Audio Engine -->

<audio id="audioPlayer"></audio>

</main>

</div>

<!-- JavaScript -->

<script src="js/main.js"></script>

<script src="js/audio.js"></script>

<script src="js/player.js"></script>

</body>

</html>
