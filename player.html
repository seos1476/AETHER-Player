<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AETHER Player</title>

<link rel="stylesheet" href="css/player.css">

</head>


<body>


<div class="background-blur"></div>


<div class="app">


<aside class="sidebar">

<div class="logo">

<h2>🎵 AETHER</h2>

<p>Offline + Spotify</p>

</div>


<nav>

<a class="active">🏠 Home</a>
<a>🎵 Library</a>
<a>❤️ Favorites</a>
<a>📁 Upload</a>
<a>⚙ Settings</a>

</nav>


</aside>




<main class="main">


<header>


<div class="search">


<input

id="searchInput"

placeholder="Search Spotify music..."

>


<div id="searchResults"></div>


</div>



<div class="top-buttons">


<button id="spotifyLogin">

🎧 Login Spotify

</button>


<input

id="musicUpload"

type="file"

accept="audio/*"

multiple

hidden

>


<button id="uploadBtn">

📁 Upload

</button>


</div>


</header>





<section class="hero-player">



<div class="album-card">


<img

id="albumArt"

class="album-art"

src=""

>


<h2 id="nowPlayingTitle">

No Song Playing

</h2>


<p id="nowPlayingArtist">

AETHER Player

</p>



<div id="progress" class="progress">

<div id="progressFill"></div>

</div>



<div class="time-info">

<span id="currentTime">
0:00
</span>


<span id="duration">
0:00
</span>

</div>




<div class="controls">


<button id="shuffleBtn">
🔀
</button>


<button id="prevBtn">
⏮
</button>


<button id="playPauseBtn">
▶
</button>


<button id="nextBtn">
⏭
</button>


<button id="repeatBtn">
🔁
</button>


</div>




<div>

🔊

<input

id="volumeSlider"

type="range"

min="0"

max="1"

step="0.01"

value="0.7"

>

</div>



</div>





<div class="playlist">


<h2>

Library

</h2>


<div id="songList">

No songs

</div>


</div>



</section>





<audio id="audioPlayer"></audio>




</main>



</div>





<!-- Spotify SDK -->

<script src="https://sdk.scdn.co/spotify-player.js"></script>



<!-- AETHER -->

<script src="js/main.js"></script>

<script src="js/audio.js"></script>

<script src="js/spotify.js"></script>

<script src="js/player.js"></script>



</body>

</html>
